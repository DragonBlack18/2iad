services:
  # Banco de Dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: 2iad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: incubadora2iad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - 2iad-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: 2iad-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/incubadora2iad?schema=public
      JWT_SECRET: seu-jwt-secret-super-seguro-aqui-mude-em-producao
      JWT_EXPIRES_IN: 7d
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
      - /app/node_modules
      - ./api/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - 2iad-network
    command: sh -c "npx prisma migrate deploy && npm run dev"

  # Frontend Público
  frontend:
    build:
      context: ./public-frontend
      dockerfile: Dockerfile
    container_name: 2iad-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./public-frontend:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - 2iad-network

networks:
  2iad-network:
    driver: bridge

volumes:
  postgres_data:
